[tox]
requires =
    tox>=4.2
env_list =
    py3

[testenv]
deps =
    allianceauth
    coverage
    django-webtest
set_env =
    DJANGO_SETTINGS_MODULE = testauth.settings.local
commands =
    python runtests.py -v 2 eve_sde.tests.load_test
install_command = python -m pip install -U {opts} {packages}
